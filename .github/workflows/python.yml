# Build, test, and publish the `folio-docx` Python wheels.
#
# Trimmed from `maturin generate-ci github` to a realistic matrix:
#   linux x86_64 + aarch64 (manylinux 2_28), macos x86_64 + arm64,
#   windows x64. Free-threaded 3.14t / musllinux / s390x / ppc64le
#   / armv7 / win-arm64 are intentionally skipped — low-volume users
#   we'll re-enable as needed.
name: Python

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  MATURIN_VERSION: v1.13.1
  PYTHON_DEFAULT: "3.12"

jobs:
  linux:
    name: Build wheel (linux ${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.target }}
          manylinux: "2_28"
          args: --release --locked --out dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: dist/*.whl

  macos:
    name: Build wheel (macos ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-13 (Intel) is intentionally omitted — GitHub-hosted Intel
          # macOS minutes are billed 10x and our free quota runs dry quickly.
          # Apple Silicon (macos-14) builds an arm64 wheel; Intel Mac users
          # can install via the source distribution (sdist) until we re-add
          # macos-13 if the budget allows.
          - target: aarch64
            runner: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: ${{ matrix.target }}
          args: --release --locked --out dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist/*.whl

  windows:
    name: Build wheel (windows x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}
          architecture: x64

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          target: x64
          args: --release --locked --out dist --compatibility pypi
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: dist/*.whl

  sdist:
    name: Build sdist
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          maturin-version: ${{ env.MATURIN_VERSION }}
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist/*.tar.gz

  test-wheel:
    name: Test wheel (${{ matrix.os }})
    needs: [linux, macos, windows]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: wheels-linux-x86_64
          # macos-13 (Intel) test omitted — see note on the build matrix.
          - os: macos-14
            artifact: wheels-macos-aarch64
          - os: windows-latest
            artifact: wheels-windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_DEFAULT }}

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

      - name: Install built wheel + pytest
        shell: bash
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install --force-reinstall --no-index --find-links dist folio-docx

      - name: Run smoke tests against the wheel
        run: python -m pytest python/tests -v

  release:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test-wheel, sdist]
    runs-on: ubuntu-22.04
    environment:
      name: pypi
      url: https://pypi.org/p/folio-docx
    permissions:
      # OIDC trusted publishing — no API token required.
      id-token: write
      # Sign the release artifacts.
      attestations: write
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: wheels-*

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          verbose: true
